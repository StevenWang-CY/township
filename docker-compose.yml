# ───────────────────────────────────────────────────────────────────────────
# Township — dev convenience compose
#
#   docker compose up            # mock provider, zero keys needed
#   LLM_PROVIDER=bedrock docker compose up   # real LLM (export creds first)
#
# Backend: uvicorn --reload with live-mounted source on :8001.
# Frontend: Vite dev server on :5173. It shares the backend's network
# namespace so Vite's proxy target (http://localhost:8001) resolves to the
# backend — which is also why BOTH ports are published on the backend service.
# ───────────────────────────────────────────────────────────────────────────

services:
  backend:
    build: .
    command: python -m uvicorn backend.main:app --reload --host 0.0.0.0 --port 8001
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      # Only used when LLM_PROVIDER points at a real provider; harmless empty.
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-}
    ports:
      - "8001:8001"
      - "5173:5173" # published here because the frontend service shares this network namespace
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./agents:/app/agents
      # - ./scenarios:/app/scenarios  # uncomment once the scenario engine lands (Phase 2)

  frontend:
    image: node:20
    working_dir: /app
    network_mode: "service:backend"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      # Linux-native node_modules live in a named volume so they never
      # clobber the host's (macOS) install.
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  frontend_node_modules:
