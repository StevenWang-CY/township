name: pages

# Deploys the zero-backend demo player (frontend/dist-demo) to GitHub Pages.
# The build stages the committed demo caches from scenarios/*/demo/ and bakes
# them into the static bundle — no server, no API keys.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Verify the zero-backend demo
        working-directory: frontend
        run: npm run test:e2e

      - name: Build demo player (stages scenarios/*/demo caches)
        working-directory: frontend
        run: npm run demo:build

      - name: Add social preview to the deployed artifact
        run: cp docs/media/social-preview.png frontend/dist-demo/social-preview.png

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
