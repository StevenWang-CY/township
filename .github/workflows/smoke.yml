# Nightly smoke: prove a fresh install still runs a zero-credential
# end-to-end simulation (mock provider) — both under pytest and via the CLI.
name: smoke

on:
  schedule:
    - cron: "17 6 * * *" # nightly, 06:17 UTC
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Mock simulation tests
        run: python -m pytest tests/test_mock_simulation.py -q

      - name: CLI end-to-end (millbrook, mock provider)
        run: township run --scenario millbrook-budget --provider mock
