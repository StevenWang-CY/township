# Nightly smoke: prove a fresh install still runs a zero-credential
# end-to-end simulation (mock provider) — both under pytest and via the CLI.
name: smoke

on:
  schedule:
    - cron: "17 6 * * *" # nightly, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv==0.10.12

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Mock simulation tests
        run: uv run --locked python -m pytest tests/test_mock_simulation.py -q

      - name: CLI end-to-end (millbrook, mock provider)
        run: uv run --locked township run --scenario millbrook-budget --provider mock
