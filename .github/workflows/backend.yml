name: backend

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv==0.10.12

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Lint
        run: uv run --locked ruff check backend tests

      - name: Test
        run: uv run --locked pytest -q

      - name: Build and smoke-test the API-only wheel
        if: matrix.python-version == '3.12'
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$(mktemp -d)"
          uv build --wheel --out-dir "$artifact_dir"
          wheel="$(find "$artifact_dir" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel"

          # Replace the editable project while retaining its locked dependency
          # environment, then exercise the installed console script away from
          # the checkout so source files cannot shadow the wheel.
          uv pip install --python .venv/bin/python --force-reinstall --no-deps "$wheel"
          (
            cd "$artifact_dir"
            "$GITHUB_WORKSPACE/.venv/bin/township" scenarios
            "$GITHUB_WORKSPACE/.venv/bin/township" new-scenario wheel-authored
            test -f scenarios/wheel-authored/scenario.json
            LLM_PROVIDER=mock MOCK_DELAY_S=0 \
              TOWNSHIP_RUNS_DIR="$artifact_dir/runs" \
              TOWNSHIP_CACHE_PATH="$artifact_dir/latest-cache.json" \
              "$GITHUB_WORKSPACE/.venv/bin/township" run \
                --scenario wheel-authored --provider mock --rounds 1
            test -n "$(find "$artifact_dir/runs" -mindepth 1 -maxdepth 1 -type d -print -quit)"
            LLM_PROVIDER=mock MOCK_DELAY_S=0 \
              "$GITHUB_WORKSPACE/.venv/bin/python" - <<'PY'
          from pathlib import Path

          from starlette.testclient import TestClient
          from backend import cli
          from backend.core.storage import PROJECT_ROOT, STATE_DIR, runs_root
          from backend.main import _SERVE_FRONTEND, app

          assert not _SERVE_FRONTEND, "the Python wheel must remain API-only"
          assert not (cli.PROJECT_ROOT / "pyproject.toml").is_file()
          assert cli._authoring_scenarios_dir() == Path.cwd() / "scenarios"
          assert PROJECT_ROOT == Path.cwd()
          assert STATE_DIR == Path.cwd() / "data" / "state"
          assert runs_root() == Path.cwd() / "runs"
          with TestClient(app) as client:
              response = client.get("/api/health")
              assert response.status_code == 200
              assert response.json()["name"] == "Township"
          PY
          )
