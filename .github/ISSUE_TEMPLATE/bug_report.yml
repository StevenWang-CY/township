name: Bug report
description: Something in Township broke, crashed, or misbehaved.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you see? Error messages verbatim, please.
      placeholder: The simulation started but the Dashboard shows every town at 0 agents...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: All four towns populated with their residents.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The shortest path from a fresh checkout to the bug.
      placeholder: |
        1. make install
        2. make dev
        3. Open /dashboard
        4. ...
    validations:
      required: true
  - type: dropdown
    id: run-mode
    attributes:
      label: Run mode
      description: Which provider/mode were you running when it broke?
      options:
        - Mock (zero-key)
        - Replay (cached simulation)
        - Ollama (local)
        - Anthropic API
        - AWS Bedrock
        - OpenAI API
        - Not sure / other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.6 / Ubuntu 24.04 / Windows 11 + WSL2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: >-
        Backend terminal output and/or browser console. Trim to the relevant
        part, and double-check nothing secret (API keys, tokens) is pasted in.
      render: shell
    validations:
      required: false
